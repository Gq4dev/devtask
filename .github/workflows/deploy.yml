name: Build and deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GHCR exige el nombre en minusculas (owner/repo)
      - name: Nombre de imagen en minusculas
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Avisa a Portainer para que re-baje la imagen y redepliegue.
      # Configura el secret PORTAINER_WEBHOOK en GitHub (Settings > Secrets > Actions).
      - name: Disparar redeploy en Portainer
        env:
          WEBHOOK: ${{ secrets.PORTAINER_WEBHOOK }}
        run: |
          if [ -n "$WEBHOOK" ]; then
            echo "Llamando al webhook de Portainer..."
            curl -fsSL -X POST "$WEBHOOK"
          else
            echo "PORTAINER_WEBHOOK no configurado, salto el redeploy."
          fi
