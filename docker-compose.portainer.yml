# Para pegar en el Web editor de un Stack de Portainer.
# La imagen la construye y publica GitHub Actions en GHCR (repo publico).
# Las variables AUTH_USER, AUTH_PASS y APP_HOST se cargan en la seccion
# "Environment variables" de Portainer (no hace falta archivo .env).
services:
  devtasks:
    image: ghcr.io/gq4dev/devtask:latest
    container_name: devtasks
    restart: unless-stopped
    environment:
      - AUTH_USER=${AUTH_USER}
      - AUTH_PASS=${AUTH_PASS}
      - DB_PATH=/data/devtasks.db
    volumes:
      - devtasks-data:/data
    ports:
      - "3001:3001"
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.devtasks.rule=Host(`${APP_HOST}`)"
      - "traefik.http.routers.devtasks.entrypoints=web"
      - "traefik.http.services.devtasks.loadbalancer.server.port=3001"

volumes:
  devtasks-data:

networks:
  traefik:
    external: true
